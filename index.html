<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="graphics/tabicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Planner</title>
</head>
<body>
    <div id="sideWidget">
        <div id="sideContent">
            <div class="top">
                <div id="clock"></div>
                <button id="openBtn"><i class="fa-solid fa-plus"></i> New task</button>
                <button id="quickNote"><i class="fa-solid fa-pencil"></i> Quick notes</button>
                <button id="pomodoro"><i class="fa-regular fa-clock"></i> Pomodoro mode</button>
            </div>
            <button id="resetBtn">Reset planner</button>
        </div>
    </div>
    <div id="matrix">
        <div id="doContainer" class="category">
            <h1>Do</h1>
            <div id="doTaskContainer" class="taskContainer"></div>
        </div>
        <div id="scheduleContainer" class="category">
            <h1>Schedule</h1>
            <div id="scheduleTaskContainer" class="taskContainer"></div>
        </div>
        <div id="delegateContainer" class="category">
            <h1>Delegate</h1>
            <div id="delegateTaskContainer" class="taskContainer"></div>
        </div>
        <div id="deleteContainer" class="category">
            <h1>Delete</h1>
            <div id="deleteTaskContainer" class="taskContainer"></div>
        </div>
    </div>
    <div id="notepad">
        <textarea id="myNote" placeholder="What's on your mind?"></textarea>
    </div>
    <div id="taskPopup">
        <form id="taskForm">
            <h1>Your task</h1>
            <div id="selectContainer">
                <div class="selects">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="do">Do</option>
                        <option value="schedule">Schedule</option>
                        <option value="delegate">Delegate</option>
                        <option value="delete">Delete</option>
                    </select>
                </div>
                <div class="selects">
                    <label for="date">Due date</label>
                    <input id="date" name="date" type="date">
                </div>
            </div>
            <br>
            <div id="inputContainer">
                <input id="title" name="title" placeholder="Task">
                <textarea id="desc" name ="desc" placeholder="Description"></textarea>
            </div>
            <br>
            <div class="btnContainer">
                <button id="saveBtn">Save</button>
                <button id="cancelBtn" type="reset">Cancel</button>
            </div>
        </form>
    </div>
    <div id ="clearPopup">
        <div id="clearPopupContents">
            Are you sure you want to clear planner?
            <div id="clearPopupBtnCon" class="btnContainer">
                <button id="yesClearBtn">Yes</button>
                <button id="noClearBtn">No</button>
            </div>
        </div> 
    </div>
    <div id="pomoMode">
        <button id="pomoExit" class="iconBtn"><i class="fa-solid fa-chevron-left"></i>Exit</button>
        <div id="timerContainer">
            <div id="timerTop">
                <div id="timer"><div id="min"></div>:<div id="sec"></div></div>
                <button id="timerReset" class="iconBtn"><i class="fa-solid fa-arrow-rotate-left"></i></button>
            </div>
            
            <div id="controlContainer">
                <div id="focusContainer" class="controlBtn timerControlBtn" onclick="setPomo('focus')">
                    Focus
                    <div class="timerInput">
                        <div class="timerAmt">
                            <input id="focus" maxlength="2">
                            <p1>min</p1>
                        </div>
                        <i class="fa-solid fa-bell-slash"></i>
                    </div>    
                </div>
                <div id="shortBrkContainer" class="controlBtn timerControlBtn" onclick="setPomo('shortBrk')">
                    Short break
                    <div class="timerInput">
                        <div class="timerAmt">
                            <input id="shortBrk" maxlength="2">
                            <p1>min</p1>
                        </div>
                        
                        <i class="fa-solid fa-mug-saucer"></i>
                    </div>  
                </div>
                <div id="longBrkContainer" class="controlBtn timerControlBtn" onclick="setPomo('longBrk')">
                    Long break
                    <div class="timerInput">
                        <div class="timerAmt">
                            <input id="longBrk" maxlength="2">
                            <p1>min</p1>
                        </div>
                        <i class="fa-solid fa-cookie-bite"></i>
                    </div>  
                </div>
                <div id="startStop" class="controlBtn">Start</div>
            </div>
        </div>
        
    </div>
</body>
<script src="index.js"></script>
</html>
